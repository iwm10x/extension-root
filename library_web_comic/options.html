<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>拡張の設定</title>
  <link rel="stylesheet" href="popup.css" />
  <style>
    body{padding:12px;width:520px;background:var(--bg);font-family:inherit;color:#111}
    .card{background:#fff;padding:12px;border-radius:8px;border:1px solid #eef6ff}
    h1{font-size:16px;margin:0 0 8px 0}
    .row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    label{font-size:13px;color:var(--muted);min-width:140px}
    input[type="text"]{flex:1;padding:8px;border:1px solid #e6eef6;border-radius:6px}
    .small{padding:6px 8px;font-size:13px;border-radius:6px}
    .muted{font-size:12px;color:var(--muted)}
    .hostsList{max-height:200px;overflow:auto;border:1px solid #eef6ff;padding:8px;border-radius:6px;background:#fbfdff}
    .hostItem{display:flex;justify-content:space-between;align-items:center;padding:6px;border-radius:6px;background:#fff;border:1px solid #e6eef6;margin-bottom:6px}
  </style>
</head>
<body>
  <div class="card">
    <h1>拡張の設定</h1>

    <div class="row">
      <label>自動バックアップ</label>
      <select id="autoBackup" class="small">
        <option value="off">無効</option>
        <option value="daily">毎日</option>
        <option value="weekly">毎週</option>
      </select>
    </div>

    <div class="row">
      <label>同期優先キー</label>
      <input id="syncKeys" type="text" placeholder="例: mangaTagHistory,mangaAutoFetchHosts" />
    </div>

    <div class="row">
      <label>エラーログを表示</label>
      <button id="showLogs" class="small">表示</button>
      <button id="clearLogs" class="small secondary">クリア</button>
    </div>

    <div style="margin-top:8px">
      <div class="muted">許可済みホスト（手動管理）</div>
      <div id="hostsList" class="hostsList" aria-live="polite"></div>
      <div style="margin-top:8px" class="row">
        <input id="addHostInput" type="text" placeholder="https://example.com/*" />
        <button id="addHostBtn" class="small">追加</button>
      </div>
    </div>

    <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
      <button id="saveOptions" class="small">保存</button>
      <button id="closeOptions" class="small secondary">閉じる</button>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
