<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>マンガ本棚</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- SVG sprite: 16/20px アイコンをここに集約 -->
  <svg style="display:none" aria-hidden="true">
    <symbol id="icon-search" viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" fill="none"/></symbol>
    <symbol id="icon-star" viewBox="0 0 24 24"><path d="M12 17.3L5.6 20l1-6.1L2 9.6l6.2-.9L12 3l3.8 5.7 6.2.9-4.6 4.3L18.4 20z" fill="currentColor"/></symbol>
    <symbol id="icon-add" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="icon-export" viewBox="0 0 24 24"><path d="M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M8 7l4-4 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="17" width="18" height="4" rx="1" fill="currentColor"/></symbol>
    <symbol id="icon-import" viewBox="0 0 24 24"><path d="M12 21V9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M8 13l4-4 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="3" width="18" height="4" rx="1" fill="currentColor"/></symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M3 21l3-1 11-11 1-3-3 1L4 20z" fill="currentColor"/></symbol>
    <symbol id="icon-delete" viewBox="0 0 24 24"><path d="M3 6h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M8 6v12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="icon-open" viewBox="0 0 24 24"><path d="M14 3l7 7-7-7zM10 21l-7-7 7 7z" fill="currentColor"/></symbol>
    <symbol id="icon-check" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="icon-menu" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
  </svg>

  <div class="controls">
    <div class="controls-left">
      <input id="searchInput" class="search-input" placeholder="検索（タイトル・タグ）" aria-label="検索">
    </div>

    <div class="controls-right">
      <select id="sortSelect" aria-label="並び替え">
        <option value="manual">手動順</option>
        <option value="updated">更新順</option>
        <option value="favorite">お気に入り優先</option>
      </select>

      <button id="favToggleBtn" class="icon-btn" aria-pressed="false" title="お気に入りのみ表示">
        <svg width="16" height="16" aria-hidden="true"><use href="#icon-star"></use></svg>
      </button>

      <button id="addToggleBtn" class="icon-btn mobile-only" aria-pressed="false" title="追加フォームを開く">
        <svg width="16" height="16" aria-hidden="true"><use href="#icon-add"></use></svg>
      </button>

      <button id="triggerCheckBtn" class="icon-btn" title="今すぐ更新チェック">
        <svg width="16" height="16" aria-hidden="true"><use href="#icon-check"></use></svg>
      </button>

      <button id="exportBtn" class="icon-btn" title="バックアップをエクスポート">
        <svg width="16" height="16" aria-hidden="true"><use href="#icon-export"></use></svg>
      </button>

      <button id="importBtn" class="icon-btn" title="バックアップをインポート">
        <svg width="16" height="16" aria-hidden="true"><use href="#icon-import"></use></svg>
      </button>
      <input id="importFile" type="file" accept="application/json" style="display:none" />

      <button id="settingsBtn" class="icon-btn" title="設定">
        <svg width="16" height="16" aria-hidden="true"><use href="#icon-menu"></use></svg>
      </button>
    </div>
  </div>

  <section id="notifyPanel" class="notify-panel" aria-live="polite">
    <div class="muted">読み込み中…</div>
  </section>

  <div class="filter-row">
    <div class="tag-filter-wrap">
      <label for="tagFilterInput" class="sr-only">タグで絞り込み</label>
      <div id="tagFilter" class="tag-filter" tabindex="0" aria-haspopup="listbox" aria-expanded="false">
        <div id="tagFilterChips" class="tag-chips"></div>
        <input id="tagFilterInput" placeholder="タグで絞り込み（Enterで追加）" />
        <button id="clearFilterBtn" class="icon-btn" title="クリア">
          <svg width="16" height="16" aria-hidden="true"><use href="#icon-menu"></use></svg>
        </button>
      </div>
      <div id="tagFilterSuggestions" class="suggestions" role="listbox" aria-hidden="true"></div>
    </div>
  </div>

  <!-- Empty State -->
  <div id="emptyState" class="empty-state" aria-hidden="true">
    <div class="empty-illustration" aria-hidden="true">
      <svg width="160" height="120" viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
        <rect x="8" y="12" width="56" height="80" rx="6" fill="#eef2ff"/>
        <rect x="96" y="12" width="56" height="80" rx="6" fill="#fff7ed"/>
        <rect x="28" y="28" width="16" height="8" rx="2" fill="#c7d2fe"/>
        <rect x="116" y="28" width="16" height="8" rx="2" fill="#ffd8a8"/>
        <rect x="28" y="44" width="32" height="8" rx="2" fill="#c7d2fe"/>
        <rect x="116" y="44" width="32" height="8" rx="2" fill="#ffd8a8"/>
      </svg>
    </div>
    <div class="empty-text">
      <h3>本棚はまだ空です</h3>
      <p>お気に入りのマンガをここに追加して、更新をチェックしましょう。</p>
      <button id="emptyAddBtn" class="primary">マンガを追加する</button>
    </div>
  </div>

  <ul id="shelfList" class="shelf-list" role="list" aria-live="polite"></ul>

  <form id="addForm" class="add-form" autocomplete="off" novalidate>
    <input id="titleInput" placeholder="タイトル" />
    <input id="urlInput" placeholder="URL" />
    <input id="coverInput" placeholder="カバーURL（任意）" />
    <div class="tags-input-wrap">
      <label for="tagsInput" class="sr-only">タグ</label>
      <div id="tagsInputContainer" class="tags-input-container" aria-haspopup="listbox" aria-expanded="false">
        <div id="tagsChips" class="tag-chips"></div>
        <input id="tagsInput" placeholder="タグを入力（Enterで追加）" />
      </div>
      <div id="tagSuggestions" class="suggestions" role="listbox" aria-hidden="true"></div>
    </div>
    <button id="addBtn" type="submit" class="primary">
      <svg width="16" height="16" aria-hidden="true"><use href="#icon-add"></use></svg> 追加
    </button>
  </form>

  <!-- 設定モーダル -->
  <div id="settingsModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle" aria-hidden="true">
    <div class="modal-content" role="document">
      <h3 id="settingsTitle">設定</h3>
      <form id="settingsForm" class="settings-form" autocomplete="off" novalidate>
        <label class="field">
          <div class="field-label">チェックバッチサイズ（batchSize）</div>
          <input id="settingBatchSize" type="number" min="1" max="200" step="1" />
          <div class="field-note">1〜200 の整数。大きすぎると処理が重くなります。</div>
        </label>

        <label class="field">
          <div class="field-label">取得タイムアウト（fetchTimeoutMs）</div>
          <input id="settingFetchTimeout" type="number" min="1000" max="60000" step="500" />
          <div class="field-note">ミリ秒単位。例: 15000（15秒）。</div>
        </label>

        <label class="field checkbox-field">
          <input id="settingUiCompact" type="checkbox" />
          <div class="field-label-inline">コンパクト表示（uiCompact）</div>
        </label>

        <label class="field checkbox-field">
          <input id="settingUiDark" type="checkbox" />
          <div class="field-label-inline">ダークモード（uiDark）</div>
        </label>

        <div class="modal-actions">
          <button type="button" id="settingsCancel">キャンセル</button>
          <button type="submit" id="settingsSave" class="primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 編集モーダル -->
  <div id="editModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle" aria-hidden="true">
    <div class="modal-content" role="document">
      <h3 id="editModalTitle">アイテムを編集</h3>
      <form id="editForm" class="edit-form" autocomplete="off" novalidate>
        <label class="field">
          <div class="field-label">タイトル</div>
          <input id="editTitle" type="text" placeholder="タイトル" required />
        </label>

        <label class="field">
          <div class="field-label">URL</div>
          <input id="editUrl" type="url" placeholder="https://..." />
        </label>

        <label class="field">
          <div class="field-label">カバー画像 URL</div>
          <input id="editCover" type="url" placeholder="https://..." />
        </label>

        <div class="cover-preview-row">
          <img id="editCoverPreview" class="cover-preview" alt="カバープレビュー" />
          <div id="editCoverPreviewFallback" class="muted">プレビューなし</div>
        </div>

        <label class="field">
          <div class="field-label">タグ（カンマ区切り）</div>
          <input id="editTags" type="text" placeholder="例: アクション, 異世界" />
        </label>

        <div class="modal-actions">
          <button type="button" id="editCancel">キャンセル</button>
          <button type="submit" id="editSave" class="primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div id="dupModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="dupTitle">
    <div class="modal-content">
      <h3 id="dupTitle">類似のアイテムが見つかりました</h3>
      <div id="dupList"></div>
      <div class="modal-actions">
        <button id="dupCancel">キャンセル</button>
        <button id="dupProceed">続けて追加する</button>
      </div>
    </div>
  </div>

  <div class="toast" style="display:none"></div>

  <script src="popup.js" defer></script>
</body>
</html>
