<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <!-- Search (16/20px) -->
  <symbol id="icon-search" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Star / Favorite -->
  <symbol id="icon-star" viewBox="0 0 24 24">
    <path d="M12 17.3L5.6 20l1-6.1L2 9.6l6.2-.9L12 3l3.8 5.7 6.2.9-4.6 4.3L18.4 20z" fill="currentColor"/>
  </symbol>

  <!-- Add / Plus -->
  <symbol id="icon-add" viewBox="0 0 24 24">
    <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Export -->
  <symbol id="icon-export" viewBox="0 0 24 24">
    <path d="M8 7l4-4 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="3" y="17" width="18" height="4" rx="1" fill="currentColor"/>
  </symbol>

  <!-- Import -->
  <symbol id="icon-import" viewBox="0 0 24 24">
    <path d="M8 13l4-4 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M12 21V9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="3" y="3" width="18" height="4" rx="1" fill="currentColor"/>
  </symbol>

  <!-- Edit -->
  <symbol id="icon-edit" viewBox="0 0 24 24">
    <path d="M3 21l3-1 11-11 1-3-3 1L4 20z" fill="currentColor"/>
  </symbol>

  <!-- Delete / Trash -->
  <symbol id="icon-delete" viewBox="0 0 24 24">
    <path d="M3 6h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M8 6v12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
  </symbol>

  <!-- Open / External -->
  <symbol id="icon-open" viewBox="0 0 24 24">
    <path d="M14 3l7 7-7-7zM10 21l-7-7 7 7z" fill="currentColor"/>
  </symbol>

  <!-- Check -->
  <symbol id="icon-check" viewBox="0 0 24 24">
    <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </symbol>

  <!-- Menu / More -->
  <symbol id="icon-menu" viewBox="0 0 24 24">
    <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
  </symbol>
</svg>